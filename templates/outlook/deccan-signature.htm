<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Deccan Fine Chemicals — email signature</title>
<style type="text/css">
  body, table, td, p, span {
    font-family: 'Segoe UI Variable Text', 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    line-height: 1.4;
    color: #292524;
  }
  .mono {
    font-family: 'Cascadia Mono', Consolas, ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: #78716C;
  }
  .name  { font-weight: 600; color: #1C1917; font-size: 14px; }
  .role  { font-weight: 400; color: #44403C; font-size: 13px; }
  .rule  { width: 56px; height: 2px; background: #164999; line-height: 0; font-size: 0; }
  a      { color: #164999; text-decoration: none; }
  a:hover{ text-decoration: underline; }
</style>
</head>
<body>
<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
  <tr>
    <td style="padding:0 16px 0 0; vertical-align:top;">
      <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr><td style="height:6px;line-height:0;font-size:0;">&nbsp;</td></tr>
        <tr><td><span class="mono">DECCAN FINE CHEMICALS</span></td></tr>
        <tr><td style="padding:4px 0;"><div class="rule">&nbsp;</div></td></tr>
        <tr><td><span class="name">{{NAME}}</span></td></tr>
        <tr><td><span class="role">{{ROLE}}</span></td></tr>
      </table>
    </td>
    <td style="padding:0; vertical-align:top; border-left:1px solid #E7E5E4; padding-left:16px;">
      <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr><td style="height:6px;line-height:0;font-size:0;">&nbsp;</td></tr>
        <tr><td><a href="mailto:{{EMAIL}}">{{EMAIL}}</a></td></tr>
        <tr><td>{{PHONE}}</td></tr>
        <tr><td><a href="https://www.deccanchemicals.com">deccanchemicals.com</a></td></tr>
        <tr><td style="padding-top:8px;"><span class="mono">CONFIDENTIAL · DO NOT FORWARD WITHOUT CONSENT</span></td></tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
